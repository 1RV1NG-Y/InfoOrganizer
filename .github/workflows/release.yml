name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Derive version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          "VERSION=$version" >> $env:GITHUB_ENV

      - name: Test
        run: dotnet test InfoOrganizer.slnx

      - name: Publish portable app
        shell: pwsh
        run: |
          dotnet publish src/InfoOrganizer.Web/InfoOrganizer.Web.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:Version=$env:VERSION `
            -o artifacts/publish

      - name: Zip portable app
        shell: pwsh
        run: Compress-Archive -Path artifacts/publish/* -DestinationPath "artifacts/InfoOrganizer-$env:VERSION-win-x64-portable.zip" -Force

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            installer/InfoOrganizer.iss `
            "/DAppVersion=$env:VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/InfoOrganizer-${{ env.VERSION }}-win-x64-portable.zip
            artifacts/installer/InfoOrganizer-${{ env.VERSION }}-Setup.exe
